  - name: eu_ess__round_06
    description: >-
      European Social Survey Round 6 integrated file (fielded 2012/13): one row per
      respondent
      across all participating countries. Covers the stable core module plus the round-specific
      rotating modules on personal and social well-being and understandings and evaluations
      of democracy. Categorical variables retain their original numeric codes, decoded
      via the
      companion dictionary table.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, country_id, respondent_id]
    columns:
      - name: year
        description: >-
          Reference year of the ESS round (round start year).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: round
        description: >-
          ESS round number (1-11).
        tests: [not_null]
      - name: country_id
        description: >-
          Country ISO 3166-1 alpha-2 code (native ESS country identifier).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_mundo__pais')
