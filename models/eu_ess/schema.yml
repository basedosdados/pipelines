---
version: 2
models:
  - name: eu_ess__round_01
    description: >-
      European Social Survey Round 1 integrated file (fielded 2002/03): one row per
      respondent
      across all participating countries. Covers the stable core module plus the round-specific
      rotating modules on immigration and citizen involvement. Categorical variables
      retain
      their original numeric codes, decoded via the companion dictionary table.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, country_id, respondent_id]
    columns:
      - name: year
        description: >-
          Reference year of the ESS round (round start year).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: round
        description: >-
          ESS round number (1-11).
        tests: [not_null]
      - name: country_id
        description: >-
          Country ISO 3166-1 alpha-2 code (native ESS country identifier).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_mundo__pais')
              field: sigla_iso2
              config:
                severity: warn
      - name: respondent_id
        description: >-
          Respondent identification number, unique within country and round.
        tests: [not_null]
      - name: dataset_title
        description: >-
          Title of dataset
      - name: edition
