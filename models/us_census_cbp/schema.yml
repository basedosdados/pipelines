  - name: us_census_cbp__county
    description: 'County Business Patterns, by county: establishments, employment
      (week of March 12) and payroll by county and NAICS industry, with establishment
      counts by employment-size class, annual 1998-2023. Two documented source characteristics:
      (a) a county part of 999 marks establishments not allocated to a specific county
      (statewide), and early years use the county vintage of their reference year
      (pre-2022 Connecticut counties, dissolved Alaska boroughs, Dade County FL),
      so about 1.2% of rows do not match the current county directory; (b) the 1999
      source file repeats a block for FIPS 01045 (Dale County, AL), leaving one conflicting
      duplicate key at NAICS 62111 out of 48.7M rows.'
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, id_county, naics]
          config:
            where: __most_recent_year_en__
      - not_null_proportion_multiple_columns:
          at_least: 1.0
          ignore_values:
            - employment_flag
            - employment_noise_flag
            - payroll_first_quarter_noise_flag
            - payroll_annual_noise_flag
            - establishments_1_4
            - establishments_5_9
            - establishments_10_19
            - establishments_20_49
            - establishments_50_99
            - establishments_100_249
            - establishments_250_499
            - establishments_500_999
            - establishments_1000
            - establishments_1000_1499
            - establishments_1500_2499
            - establishments_2500_4999
            - establishments_5000_more
          config:
            where: __most_recent_year_en__
    columns:
      - name: year
        description: Reference year
        tests:
          - not_null:
              config:
                where: __most_recent_year_en__
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
              config:
                where: __most_recent_year_en__
      - name: id_state
        description: FIPS state code
        tests:
          - not_null:
              config:
                where: __most_recent_year_en__
          - custom_relationships:
              to: ref('br_bd_diretorios_us__state')
              field: id_state
              config:
                where: __most_recent_year_en__
      - name: id_county
        description: FIPS county code, five digits (state + county); a county part
          of 999 means establishments not allocated to a specific county (statewide)
        tests:
          - not_null:
              config:
                where: __most_recent_year_en__
          - custom_relationships:
              to: ref('br_bd_diretorios_us__county')
              field: id_county
              proportion_allowed_failures: 0.02
              config:
                where: __most_recent_year_en__
      - name: naics
        description: NAICS industry code at its published aggregation level (2 to
          6 digits); vintage varies by year, see naics_version
        tests:
          - not_null:
              config:
                where: __most_recent_year_en__
          - custom_relationships:
              to: ref('br_bd_diretorios_us__naics_2017')
              field: id_naics
              config:
                where: __most_recent_year_en__
      - name: naics_version
        description: NAICS classification vintage the code follows (1997, 2002, 2007,
          2012, 2017)
      - name: establishments
        description: Number of establishments
      - name: employment
        description: Number of paid employees during the week of March 12
      - name: employment_flag
        description: Data-suppression flag marking the employment-size range of a
          withheld cell (1998 to 2016 suppression era)
      - name: employment_noise_flag
        description: Noise-infusion flag for employment from 2017 onward; G, H, J
          indicate increasing noise, D and S indicate withheld
      - name: payroll_first_quarter
        description: First-quarter payroll in current U.S. dollars
      - name: payroll_first_quarter_noise_flag
        description: Noise-infusion flag for first-quarter payroll
      - name: payroll_annual
        description: Annual payroll in current U.S. dollars
      - name: payroll_annual_noise_flag
        description: Noise-infusion flag for annual payroll
      - name: establishments_1_4
        description: Number of establishments with 1 to 4 employees
      - name: establishments_5_9
        description: Number of establishments with 5 to 9 employees
      - name: establishments_10_19
        description: Number of establishments with 10 to 19 employees
      - name: establishments_20_49
        description: Number of establishments with 20 to 49 employees
      - name: establishments_50_99
        description: Number of establishments with 50 to 99 employees
      - name: establishments_100_249
        description: Number of establishments with 100 to 249 employees
      - name: establishments_250_499
        description: Number of establishments with 250 to 499 employees
      - name: establishments_500_999
        description: Number of establishments with 500 to 999 employees
      - name: establishments_1000
        description: Number of establishments with 1,000 or more employees
      - name: establishments_1000_1499
        description: Number of establishments with 1,000 to 1,499 employees
      - name: establishments_1500_2499
        description: Number of establishments with 1,500 to 2,499 employees
      - name: establishments_2500_4999
        description: Number of establishments with 2,500 to 4,999 employees
      - name: establishments_5000_more
