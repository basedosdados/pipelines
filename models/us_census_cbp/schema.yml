  - name: us_census_cbp__dicionario
    description: Dictionary of coded values used across the us_census_cbp tables (legal
      form of organization, NAICS vintage, and disclosure/noise flags).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [id_tabela, nome_coluna, chave]
      - not_null_proportion_multiple_columns:
          at_least: 1.0
    columns:
      - name: id_tabela
        description: Table name the key belongs to
        tests: [not_null]
      - name: nome_coluna
        description: Column name the key belongs to
        tests: [not_null]
      - name: chave
        description: Coded value as stored in the data
        tests: [not_null]
      - name: cobertura_temporal
        description: Temporal coverage of the key
      - name: valor
        description: Human-readable label of the coded value
        tests: [not_null]
