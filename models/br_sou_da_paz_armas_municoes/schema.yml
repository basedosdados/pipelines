---
version: 2
models:
  - name: br_sou_da_paz_armas_municoes__nova_arma_registro_cac
    description: Novos registros CACs
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - periodo
            - id_regiao_militar
            - sigla_uf
            - categoria_informada
      - not_null_proportion_multiple_columns:
          at_least: 0.01
    columns:
      - name: ano
        description: Ano
        tests:
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: periodo
        description: Período em referência aos dados. e.g., 2020/total ou 2020/parcial
      - name: consolidado
        description: Se o dado foi consolidado pela equipe da Sou da Paz
      - name: id_regiao_militar
        description: Código da Região Militar
      - name: area_regiao_militar
        description: Área da Região Militar
      - name: sigla_uf
        description: Sigla da unidade da federação
        tests:
          - custom_relationships:
              to: ref('br_bd_diretorios_brasil__uf')
              field: sigla
              ignore_values: [BR]
      - name: unidade
        description: Unidade
      - name: quantidade
        description: Quantidade
      - name: categoria_informada
        description: Categoria Informada
      - name: categoria_principal
        description: Categoria Principal
      - name: macrocategoria_1
