  - name: in_tcpd_elections__dictionary
    description: >
      Dicionário de valores codificados das tabelas de eleições gerais e
      estaduais do TCPD Lok Dhaba, com o rótulo correspondente a cada chave.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [table_id, column_name, key]
    columns:
      - name: table_id
        description: Nome da tabela à qual a entrada do dicionário se refere
        tests: [not_null]
      - name: column_name
        description: Nome da coluna à qual a entrada do dicionário se refere
        tests: [not_null]
      - name: key
        description: Chave (valor codificado) presente na coluna da tabela
        tests: [not_null]
      - name: temporal_coverage
        description: Cobertura temporal da entrada do dicionário
      - name: value
        description: Rótulo correspondente à chave codificada
