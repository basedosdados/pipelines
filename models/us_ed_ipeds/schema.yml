version: 2
models:
  - name: us_ed_ipeds__adm
    description: >-
      Admissions and test scores (ADM survey component), including applications, admissions,
      enrollments, and SAT/ACT score distributions, one row per institution per year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, unitid]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
          ignore_values:
            - act_writing_25th
            - act_writing_75th
            - admssnan
            - enrlan
            - enrlftan
            - enrlptan
    columns:
      - name: year
        description: >-
          Year of the survey data collection (fall of academic year for most components)
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
