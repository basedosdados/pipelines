  - name: us_ed_ipeds__f3
    description: >-
      Finance (F3 survey component) for private for-profit institutions, one row per
      institution
      per fiscal year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, unitid]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
          ignore_values:
            - f3e043
            - f3e044
            - f3e045
            - f3e046
            - f3e047
            - f3e103
            - f3e104
            - f3e105
            - f3e106
            - f3e107
            - f3g01
            - f3g02
            - f3g03
            - f3g04
            - f3g05
            - f3g06
            - f3g07
    columns:
      - name: year
        description: >-
          Year of the survey data collection (fall of academic year for most components)
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: unitid
        description: >-
          Unique identification number of the institution
        tests: [not_null]
