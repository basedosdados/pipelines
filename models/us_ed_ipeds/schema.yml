    description: >-
      Student charges for academic-year programs (IC_AY survey component), including
      tuition,
      fees, and cost of attendance, one row per institution per year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, unitid]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
          ignore_values:
            - cmp1ay0
            - cmp1gtd
            - cmp2ay0
            - cmp2gtd
            - cmp3ay0
            - cmp3gtd
            - xcmp1ay0
            - xcmp2ay0
            - xcmp3ay0
