  - name: us_ed_ipeds__flags
    description: >-
      Response status flags for all IPEDS survey components, indicating response,
      imputation,
      and parent/child reporting status, one row per institution per year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, unitid]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
          ignore_values:
            - cohrtaid
            - fp_ef
            - fp_ic
            - idx_eap
            - idx_s
            - idx_sa
            - imp_eap
            - imp_s
            - imp_sa
            - lock_eap
            - lock_s
            - lock_sa
            - ndst2005
            - pcc_m
            - pceap_f
            - pceap_m
            - pcef_m
            - pcf_m
            - pcffp_f
            - pcffp_m
            - pcgr_m
            - pcs_f
            - pcs_m
            - pcsa_f
            - pcsa_m
            - pcsfa_m
            - prch_eap
            - prch_s
            - prch_sa
            - rev_eap
            - rev_s
            - rev_sa
    columns:
      - name: year
        description: >-
          Year of the survey data collection (fall of academic year for most components)
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: unitid
        description: >-
          Unique identification number of the institution
        tests: [not_null]
      - name: stat_ic
        description: >-
          Response status -  Institutional characteristics component
      - name: lock_ic
        description: >-
          Status of IC component when institution was migrated
      - name: imp_ic
        description: >-
          Type of imputation method Institutional Characteristics
      - name: stat_c
        description: >-
          Response status -  Completions component
      - name: lock_c
        description: >-
          Status of completions component when institution was migrated
      - name: prch_c
        description: >-
          Parent/child indicator for completions
      - name: idx_c
        description: >-
          UnitID of Parent institution
      - name: pcc_f
        description: >-
          Parent/child allocation factor - Completions
      - name: imp_c
        description: >-
          Type of imputation method Completions
      - name: stat_e12
        description: >-
          Response status of institution - 12-month enrollment
      - name: lock_e12
        description: >-
          Status of 12-month enrollment component whe data collection closed
      - name: prch_e12
        description: >-
          Parent/child indicator for 12-month enrollment
      - name: idx_e12
        description: >-
          ID number of parent institution - 12-month enrollment
      - name: pce12_f
        description: >-
          Parent/child allocation factor - 12-month enrollment
      - name: imp_e12
        description: >-
          Type of imputation method - 12 month enrollment
      - name: stat_sfa
        description: >-
          Response status for Student Financial Aid survey
      - name: lock_sfa
        description: >-
          Status of Student Financial Aid Survey when data collection closed
      - name: prch_sfa
        description: >-
          Parent/child indicator Student Financial Aid survey
      - name: idx_sfa
        description: >-
          ID number of parent institution Student Financial Aid
      - name: pcsfa_f
        description: >-
          Parent/child allocation factor - Student Financial Aid
      - name: imp_sfa
        description: >-
          Type of imputation method Student Financial Aid
      - name: sfaform
