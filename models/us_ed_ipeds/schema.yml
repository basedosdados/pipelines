    description: >-
      Graduation rates (GR survey component) for cohorts tracked at 150 percent of
      normal time,
      by race/ethnicity and gender, one row per institution, cohort type, completion
      status,
      and year.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - year
            - unitid
            - grtype
            - chrtstat
            - section
            - cohort
            - line
      - not_null_proportion_multiple_columns:
          at_least: 0.05
    columns:
      - name: year
        description: >-
          Year of the survey data collection (fall of academic year for most components)
