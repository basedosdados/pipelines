  - name: af_afrobarometer_survey__round4
    description: >-
      Afrobarometer merged Round 4 survey microdata (2008-2009), one row per respondent
      across
      0 African countries. Original Afrobarometer variable codes are preserved as
      column names;
      coded values are documented in the dicionario table.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [respno]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
    columns:
      - name: country_iso3_code
        description: >-
          Country ISO3 code (derived from COUNTRY).
        tests:
          - relationships:
              to: ref('br_bd_diretorios_mundo__pais')
              field: sigla_iso3
