  - name: af_afrobarometer_survey__round8
    description: >-
      Afrobarometer merged Round 8 survey microdata (2019-2021), one row per respondent
      across
      0 African countries. Original Afrobarometer variable codes are preserved as
      column names;
      coded values are documented in the dicionario table. A small share of duplicate
      respondent
      numbers exists in the raw source, so the uniqueness test allows up to 5 percent
      failures.
    tests:
      - custom_unique_combinations_of_columns:
          combination_of_columns: [respno]
          proportion_allowed_failures: 0.05
    columns:
      - name: country_iso3_code
        description: >-
          Country ISO3 code (derived from COUNTRY).
        tests:
          - relationships:
              to: ref('br_bd_diretorios_mundo__pais')
              field: sigla_iso3
      - name: respno
        description: >-
          Respondent number
        tests: [not_null]
      - name: country_old_spelling
        description: >-
          Country old spelling/order
      - name: country_r7list
        description: >-
          Country in R7 Alphabetical Order
