  - name: af_afrobarometer_survey__round3
    description: >-
      Afrobarometer merged Round 3 survey microdata (2005-2006), one row per respondent
      across
      0 African countries. Original Afrobarometer variable codes are preserved as
      column names;
      coded values are documented in the dicionario table.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [respno]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
