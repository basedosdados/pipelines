          tags: [diretorio]
          combination_of_columns: [id_census_occupation]
    columns:
      - name: id_census_occupation
        description: Código de ocupação do Census de 2010 (quatro dígitos, com zeros
          à esquerda)
        tests: [not_null]
      - name: name
        description: Nome da ocupação
