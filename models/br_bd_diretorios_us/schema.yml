    tests:
      - dbt_utils.unique_combination_of_columns:
          tags: [diretorio]
          combination_of_columns: [id_census_occupation]
    columns:
      - name: id_census_occupation
        description: Código de ocupação do Census de 2018 (quatro dígitos, com zeros
          à esquerda)
        tests: [not_null]
      - name: name
        description: Nome da ocupação
      - name: id_soc
        description: >-
          Código SOC correspondente; pode conter intervalos ou múltiplos códigos conforme
