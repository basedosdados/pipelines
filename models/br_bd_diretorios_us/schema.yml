        description: >
          Código SOC correspondente; pode conter intervalos ou múltiplos códigos conforme
          publicado pelo Census
  - name: br_bd_diretorios_us__census_occupation_2018
    description: >
      Diretório da classificação ocupacional do Census dos EUA, revisão de 2018, usada
