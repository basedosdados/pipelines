    columns:
      - name: id_census_industry
        description: Código de indústria do Census de 2007 (quatro dígitos, com zeros
          à esquerda)
        tests: [not_null]
      - name: name
        description: Nome da indústria
      - name: id_naics
        description: >
          Código(s) NAICS correspondente(s); pode conter intervalos, múltiplos códigos
          ou correspondências parciais conforme publicado pelo Census
  - name: br_bd_diretorios_us__census_industry_2012
    description: >
