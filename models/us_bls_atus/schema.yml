  - name: us_bls_atus__roster
    description: >-
      ATUS household roster: age, sex, and relationship to the respondent for each
      household member and the respondent's nonhousehold children under 18.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, tucaseid, tulineno]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
    columns:
      - name: year
        description: >-
          Reference year of the ATUS interview (diary year).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: tucaseid
        description: >-
          ATUS case identification number; primary key that links all ATUS files.
          First four digits are the interview year.
        tests: [not_null]
      - name: tulineno
        description: >-
          ATUS person line number identifying each individual within the household.
        tests: [not_null]
      - name: terrp
        description: >-
          Relationship of the person to the ATUS respondent.
      - name: teage
        description: >-
          Age of the person in years (topcoded at 80 for years ≤ 2004 and at 85 for
          years ≥ 2005).
      - name: tesex
        description: >-
          Sex of the person (1 = male, 2 = female).
  - name: us_bls_atus__cps
    description: >-
      ATUS-CPS file: Current Population Survey demographics for each household member,
      collected 2 to 5 months before the ATUS interview.
    tests:
