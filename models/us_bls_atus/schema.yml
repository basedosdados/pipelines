---
version: 2
models:
  - name: us_bls_atus__respondent
    description: >-
      ATUS respondent file: one record per interviewed respondent per year, with labor
      force status, earnings, the ATUS final weight, and derived time-use totals.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, tucaseid]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
    columns:
      - name: year
        description: >-
          Reference year of the ATUS interview (diary year).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: tucaseid
        description: >-
          ATUS case identification number; primary key that links all ATUS files.
          First four digits are the interview year.
        tests: [not_null]
      - name: tulineno
