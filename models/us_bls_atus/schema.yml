  - name: us_bls_atus__activity
    description: >-
      ATUS activity file: one record per activity episode in the 24-hour diary, with
      the activity code, start/stop times, location, and secondary childcare/eldercare
      information.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, tucaseid, tuactivity_n]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
    columns:
      - name: year
        description: >-
          Reference year of the ATUS interview (diary year).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: tucaseid
        description: >-
          ATUS case identification number; primary key that links all ATUS files.
          First four digits are the interview year.
        tests: [not_null]
      - name: tuactivity_n
        description: >-
          Activity line number sequencing the activities reported on the diary day.
        tests: [not_null]
      - name: tuactdur24
        description: >-
          Duration of activity in minutes (last activity truncated at 4:00 a.m.)
      - name: tucc5
        description: >-
          Was at least one of your own household children < 13 in your care during
          this activity?
      - name: tucc5b
        description: >-
          Was at least one of your non-own household children < 13 in your care during
          this activity?
      - name: trtcctot_ln
        description: >-
          Total time spent during activity providing secondary childcare for all children
          < 13 (in minutes)
      - name: trtcc_ln
        description: >-
          Total time spent during activity providing secondary child care for household
          and own nonhousehold children < 13 (in minutes)
      - name: trtcoc_ln
        description: >-
          Total time spent during activity providing secondary child care for nonown,
          nonhousehold children <13 (in minutes)
      - name: tustarttim
        description: >-
          Activity start time
      - name: tustoptime
        description: >-
          Activity stop time
      - name: trcodep
        description: >-
          Pooled six-digit activity code
      - name: trtier1p
        description: >-
          Pooled lexicon tier 1: 1st and 2nd digits of 6-digit activity code
      - name: trtier2p
        description: >-
          Pooled lexicon tiers 1 and 2: 1st four digits of 6-digit activity code
      - name: tucc8
        description: >-
          Other than household or own non-household children < 13, was there a child
          0-12 in your care during this activity?
      - name: tucumdur
        description: >-
          Cumulative duration of activity lengths in minutes; last activity not truncated
          at 4:00am or 1440 minutes (cumulative total of TUACTDUR for each TUCASEID)
      - name: tucumdur24
        description: >-
          Cumulative duration of activity lengths in minutes; last activity truncated
          at 4:00am or 1440 minutes (cumulative total of TUACTDUR24 for each TUCASEID)
      - name: tuactdur
        description: >-
          Duration of activity in minutes (last activity not truncated at 4:00 a.m.)
      - name: tr_03cc57
        description: >-
          Was a household or own non-household child < 13 in your care during this
          activity?
      - name: trto_ln
        description: >-
          Total time spent during activity providing secondary childcare for own children
          < 13 (in minutes)
      - name: trtonhh_ln
        description: >-
          Total time spent during activity providing secondary childcare for own nonhousehold
          children < 13 (in minutes)
      - name: trtohh_ln
        description: >-
          Total time spent during activity providing secondary childcare for own household
          children < 13 (in minutes)
      - name: trthh_ln
        description: >-
          Total time spent during activity providing secondary childcare for household
          children < 13 (in minutes)
      - name: trtnohh_ln
        description: >-
          Total time spent during activity providing secondary childcare for nonown
          household children < 13 (in minutes)
      - name: tewhere
        description: >-
          Location or mode of transportation where the activity took place.
      - name: tucc7
        description: >-
          Was at least one of your own non-household children < 13 in your care during
          this activity?
      - name: trwbelig
        description: >-
          Flag indicating whether the case was eligible for the Well-Being Module.
      - name: trtec_ln
        description: >-
          Time (in minutes) spent providing eldercare by activity
      - name: tuec24
        description: >-
          At which times or during which activities did you provide that care or assistance
          yesterday?
      - name: tudurstop
        description: >-
          Method for reporting activity duration
  - name: us_bls_atus__who
    description: >-
      ATUS who file: the people who were present during each activity episode.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - year
            - tucaseid
            - tuactivity_n
            - tuwho_code
            - tulineno
      - not_null_proportion_multiple_columns:
          at_least: 0.05
    columns:
      - name: year
        description: >-
          Reference year of the ATUS interview (diary year).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: tucaseid
        description: >-
          ATUS case identification number; primary key that links all ATUS files.
          First four digits are the interview year.
        tests: [not_null]
      - name: tulineno
        description: >-
          ATUS person line number identifying each individual within the household.
        tests: [not_null]
      - name: tuactivity_n
        description: >-
          Activity line number sequencing the activities reported on the diary day.
        tests: [not_null]
      - name: trwhona
        description: >-
          Who information not asked for activity
      - name: tuwho_code
        description: >-
          Code identifying who was present with the respondent during the activity.
        tests: [not_null]
  - name: us_bls_atus__activity_summary
    description: >-
      ATUS activity summary reshaped to long form: total minutes each respondent spent
      on each six-digit activity code on the diary day (only non-zero durations are
      stored).
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, tucaseid, activity_code]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
    columns:
      - name: year
        description: >-
          Reference year of the ATUS interview (diary year).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: tucaseid
        description: >-
          ATUS case identification number; primary key that links all ATUS files.
          First four digits are the interview year.
        tests: [not_null]
      - name: activity_code
        description: >-
          Six-digit ATUS activity code (2003-24 Coding Lexicon) that time was reported
          against.
        tests: [not_null]
      - name: duration_minutes
        description: >-
          Total minutes the respondent spent doing the activity on the diary day.
  - name: us_bls_atus__eldercare_roster
    description: >-
      ATUS eldercare roster (2011 onward): one record per eldercare recipient, with
      the recipient's age, relationship, and duration of care provided.
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns: [year, tucaseid, tueclno]
      - not_null_proportion_multiple_columns:
          at_least: 0.05
    columns:
      - name: year
        description: >-
          Reference year of the ATUS interview (diary year).
        tests:
          - not_null
          - relationships:
              to: ref('br_bd_diretorios_data_tempo__ano')
              field: ano.ano
      - name: tucaseid
        description: >-
          ATUS case identification number; primary key that links all ATUS files.
          First four digits are the interview year.
        tests: [not_null]
      - name: teage_ec
        description: >-
          Age of the eldercare recipient in years (topcoded at 85).
      - name: teeldur
        description: >-
          How long have you provided care to [NAME]?
      - name: teelwho
        description: >-
          Who did you give this care to?
      - name: teelyrs
        description: >-
          How many years have you provided care (to this person)?
      - name: trelhh
        description: >-
          Eldercare recipient is a household member
      - name: tueclno
        description: >-
          Line number of eldercare recipient
        tests: [not_null]
      - name: tulineno
        description: >-
          ATUS person line number identifying each individual within the household.
