---
name: Build Prefect 3 Docker image (dev)
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [labeled, synchronize]
    paths:
      - Dockerfile
      - entrypoint.sh
      - pyproject.toml
      - uv.lock
      - packages.yml
      - dbt_project.yml
env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/pipelines
  PREFECT3_API_URL: https://prefect3.basedosdados.org/api
jobs:
  build:
    name: Build and push (dev)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'deploy-flow')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:dev
          # Instala o dbt Fusion na imagem (ver Dockerfile). Defina a variável
          # de repositório DBT_FUSION_VERSION para fixar a versão; vazia = latest.
          build-args: |
            DBT_FUSION_VERSION=${{ vars.DBT_FUSION_VERSION }}
      - name: Update work pool image
        run: |-
          curl -s "${{ env.PREFECT3_API_URL }}/work_pools/basedosdados-dev" \
            -H "Authorization: Bearer ${{ secrets.PREFECT3_AUTH_TOKEN }}" \
            -o /tmp/wp.json
          python3 -c "
          import json
          with open('/tmp/wp.json') as f:
              wp = json.load(f)
          wp['base_job_template']['job_configuration']['image'] = '${{ env.IMAGE }}:dev'
          with open('/tmp/wp-patch.json', 'w') as f:
              json.dump({'base_job_template': wp['base_job_template']}, f)
          "
          curl -s -o /dev/null -w "Work pool 'basedosdados-dev' updated: HTTP %{http_code}\n" \
            -X PATCH "${{ env.PREFECT3_API_URL }}/work_pools/basedosdados-dev" \
            -H "Authorization: Bearer ${{ secrets.PREFECT3_AUTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/wp-patch.json
