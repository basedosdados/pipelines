---
name: 📖 docs
description: Documentação (README, docstrings, comentários, arquivos .md)
title: '[docs] '
labels: [documentation]
body:
  - type: textarea
    id: descricao
    attributes:
      label: Descrição do problema ou da melhoria
      description: O que precisa ser corrigido, atualizado ou adicionado.
    validations:
      required: true
  - type: textarea
    id: referencias
    attributes:
      label: Referências
      description: Links para o arquivo afetado, PRs relacionados ou documentação
        externa.
