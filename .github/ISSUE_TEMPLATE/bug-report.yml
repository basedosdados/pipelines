---
name: 🐞 bug
description: Defeito em código, tooling, CI ou comportamento de pipeline
title: '[bug] '
labels: [bug]
body:
  - type: textarea
    id: descricao
    attributes:
      label: Descrição do bug
      description: O que está acontecendo? Inclua logs, mensagens de erro e prints
        quando aplicável.
    validations:
      required: true
  - type: textarea
    id: reproducao
    attributes:
      label: Como reproduzir
      description: Passos mínimos para reproduzir o problema (flow, comando, branch,
        ambiente).
    validations:
      required: true
  - type: textarea
    id: referencias
    attributes:
      label: Referências
      description: Links para PRs, issues relacionadas, runs do Prefect ou Actions.
